{% extends 'base.html' %}

{% block title %}Log In - InvoiceHubNet{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container glass-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-file-invoice"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="text-secondary">Log in to your InvoiceHubNet account</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            
            <div class="form-group flex justify-between items-center">
                <label class="form-check">
                    <input type="checkbox" name="remember" class="form-check-input">
                    <span class="form-check-label">Remember me</span>
                </label>
                <a href="{{ url_for('auth.forgot_password') }}" class="text-sm">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-full">
                <i class="fas fa-sign-in-alt"></i> Log In
            </button>
        </form>
        
        <div class="auth-divider">
            <span>or continue with</span>
        </div>
        
        <div class="auth-social">
            <button class="btn btn-outline w-full">
                <i class="fab fa-google"></i> Google
            </button>
        </div>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_head %}
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-8); background: linear-gradient(135deg, var(--gray-100), var(--gray-50)); }
body.dark-mode .auth-page { background: linear-gradient(135deg, var(--dark-bg), var(--dark-bg-secondary)); }
.auth-container { width: 100%; max-width: 420px; padding: var(--space-10); }
.auth-header { text-align: center; margin-bottom: var(--space-8); }
.auth-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary-600), var(--secondary-600)); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4); color: white; font-size: var(--text-3xl); }
.auth-header h1 { font-size: var(--text-2xl); margin-bottom: var(--space-2); }
.auth-form { margin-bottom: var(--space-6); }
.auth-divider { text-align: center; margin: var(--space-6) 0; position: relative; }
.auth-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-color); }
.auth-divider span { background: var(--bg-secondary); padding: 0 var(--space-4); position: relative; color: var(--text-muted); font-size: var(--text-sm); }
.auth-social { display: grid; gap: var(--space-3); margin-bottom: var(--space-6); }
.auth-footer { text-align: center; color: var(--text-secondary); font-size: var(--text-sm); }
.auth-footer a { font-weight: 500; }
</style>
{% endblock %}
