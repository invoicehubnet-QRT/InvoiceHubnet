{% extends 'base.html' %}

{% block title %}Sign Up - InvoiceHubNet{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container glass-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-file-invoice"></i>
            </div>
            <h1>Create Account</h1>
            <p class="text-secondary">Start creating professional invoices today</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
                <div class="form-group">
                    <label class="form-label" for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" class="form-input" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" class="form-input" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter password" required>
            </div>
            
            <div class="form-group">
                <label class="form-check">
                    <input type="checkbox" name="terms" class="form-check-input" required>
                    <span class="form-check-label">I agree to the <a href="{{ url_for('main.terms') }}" target="_blank">Terms of Service</a> and <a href="{{ url_for('main.privacy') }}" target="_blank">Privacy Policy</a></span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-full">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_head %}
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-8); background: linear-gradient(135deg, var(--gray-100), var(--gray-50)); }
body.dark-mode .auth-page { background: linear-gradient(135deg, var(--dark-bg), var(--dark-bg-secondary)); }
.auth-container { width: 100%; max-width: 480px; padding: var(--space-10); }
.auth-header { text-align: center; margin-bottom: var(--space-8); }
.auth-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary-600), var(--secondary-600)); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4); color: white; font-size: var(--text-3xl); }
.auth-header h1 { font-size: var(--text-2xl); margin-bottom: var(--space-2); }
.auth-form { margin-bottom: var(--space-6); }
.auth-footer { text-align: center; color: var(--text-secondary); font-size: var(--text-sm); }
.auth-footer a { font-weight: 500; }
</style>
{% endblock %}
